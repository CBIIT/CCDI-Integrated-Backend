# Facet filters and how to query/aggregate them
# agg_name - facet filter's corresponding field in Opensearch query
# cardinality_agg_name - Opensearch field for identify unique results
# filter_count_name - what to call the count in GraphQL
# widget_count_name - what to call the widget count in GraphQL
# additional_update - values whose counts must be corrected

diagnoses_table:
  - agg_name: age_at_diagnosis
    cardinality_agg_name: pid
    filter_count_name: filterParticipantCountByDiagnosisAge
    widget_count_name: participantCountByDiagnosisAge
  - agg_name: diagnosis
    cardinality_agg_name: pid
    filter_count_name: filterParticipantCountByDiagnosis
    widget_count_name: participantCountByDiagnosis
  - agg_name: diagnosis_anatomic_site
    cardinality_agg_name: pid
    filter_count_name: filterParticipantCountByDiagnosisAnatomicSite
    widget_count_name: null
  - agg_name: diagnosis_basis
    cardinality_agg_name: pid
    filter_count_name: filterParticipantCountByDiagnosisBasis
    widget_count_name: null
    additional_update:
      Clinical: 3500
      Not Reported: 2000
      Unknown: 4000
  - agg_name: diagnosis_category
    cardinality_agg_name: pid
    filter_count_name: filterParticipantCountByDiagnosisCategory
    widget_count_name: participantCountByDiagnosisCategory
  - agg_name: diagnosis_classification_system
    cardinality_agg_name: pid
    filter_count_name: filterParticipantCountByDiagnosisClassificationSystem
    widget_count_name: null
    additional_update:
      ICD-O-3.2: 5000
      'Indication for Study': 1000
  - agg_name: disease_phase
    cardinality_agg_name: pid
    filter_count_name: filterParticipantCountByDiseasePhase
    widget_count_name: null
    additional_update:
      Initial Diagnosis: 4000
      Not Reported: 3500

            reported_significance_system: case when row.ga is not null then row.ga.reported_significance_system else null end,
            gene_symbol: case when row.ga is not null then apoc.coll.toSet(CASE
                                  WHEN row.ga.gene_symbol STARTS WITH '[' AND row.ga.gene_symbol ENDS WITH ']' THEN
                                    [x IN split(replace(substring(row.ga.gene_symbol, 1, size(row.ga.gene_symbol)-2), "'", ""), ",") | 
                                      CASE 
                                        WHEN apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') = '' 
                                        THEN 'Not Reported' 
                                        ELSE apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') 
                                      END
                                    ]
                                  ELSE
                                    [CASE 
                                      WHEN apoc.text.replace(trim(row.ga.gene_symbol), '^[^A-Za-z0-9]+', '') = '' 
                                      THEN 'Not Reported' 
                                      ELSE apoc.text.replace(trim(row.ga.gene_symbol), '^[^A-Za-z0-9]+', '') 
                                    END]
                                END) else null end,
            alteration: case when row.ga is not null then row.ga.alteration else null end,
            fusion_partner_gene: case when row.ga is not null then row.ga.fusion_partner_gene else null end,
            alteration_type: case when row.ga is not null then row.ga.alteration_type else null end,
            status: case when row.ga is not null then row.ga.status else null end
          }) as sample_diagnosis_genetic_analysis_filter
          MATCH (p)<--(file)
          OPTIONAL MATCH (p)<-[:of_survival]-(su:survival)
          OPTIONAL MATCH (p)<-[:of_treatment]-(tr:treatment)
          OPTIONAL MATCH (p)<-[:of_treatment_response]-(tresp:treatment_response)
          with file, p, sample_diagnosis_genetic_analysis_filter,
            CASE WHEN collect(su) <> [] THEN COLLECT(DISTINCT {last_known_survival_status: su.last_known_survival_status, 
              cause_of_death: su.cause_of_death, 
              first_event: su.first_event,
              age_at_last_known_survival_status: su.age_at_last_known_survival_status} ) ELSE [] END as survival_filters,
            CASE WHEN collect(tr) <> [] THEN COLLECT(DISTINCT{treatment_type: apoc.text.split(tr.treatment_type, ';'),
            treatment_agent: apoc.text.split(tr.treatment_agent, ';'),
            age_at_treatment_start: tr.age_at_treatment_start,
            age_at_treatment_end: tr.age_at_treatment_end}) ELSE [] END as treatment_filters,
            CASE WHEN collect(tresp) <> [] THEN COLLECT(DISTINCT{response_category: tresp.response_category,
            age_at_response: tresp.age_at_response,
            response: tresp.response,
            response_system: tresp.response_system}) ELSE [] END as treatment_response_filters
          with file.dcf_indexd_guid as file_uid, p, sample_diagnosis_genetic_analysis_filter, survival_filters, treatment_filters, treatment_response_filters
          WITH file_uid, p,
              coalesce(sample_diagnosis_genetic_analysis_filter, [])    AS sdgaf,
              coalesce(survival_filters, [])           AS svf,
              coalesce(treatment_filters, [])          AS tf,
              coalesce(treatment_response_filters, []) AS trf
          WITH file_uid, p,
              collect(sdgaf) AS sdgaf_lists,
              collect(svf) AS svf_lists,
              collect(tf)  AS tf_lists,
              collect(trf) AS trf_lists
          WITH file_uid, p, {
            participant_id: p.participant_id,
            race: apoc.text.split(p.race, ';'),
            sex_at_birth: p.sex_at_birth,
            sample_diagnosis_genetic_analysis_filters:    apoc.coll.toSet(apoc.coll.flatten(sdgaf_lists)),
            survival_filters:           apoc.coll.toSet(apoc.coll.flatten(svf_lists)),
            treatment_filters:          apoc.coll.toSet(apoc.coll.flatten(tf_lists)),
            treatment_response_filters: apoc.coll.toSet(apoc.coll.flatten(trf_lists))
          } AS rowmap
          WITH file_uid, collect(distinct p.id) as pids, collect(distinct p.participant_id) as participant_ids, collect(DISTINCT rowmap) AS combined_filters
          OPTIONAL MATCH (file)-->(:participant)-->(:consent_group)-->(st:study)
          where (file:clinical_measure_file or file: generic_file or file:radiology_file) and file.dcf_indexd_guid = file_uid
          WITH file_uid, pids, participant_ids, combined_filters, head(collect(file)) AS file, head(collect(st)) AS st
          RETURN DISTINCT
            file_uid as id,
            file_uid AS file_id,
            pids as pid,
            participant_ids AS participant_id,
            null AS sample_id,
            st.study_id AS study_id,
            st.dbgap_accession as dbgap_accession,
            st.study_status AS study_status,
            st.study_acronym as study_acronym,
            st.study_name as study_name,
            file.dcf_indexd_guid AS guid,
            file.file_name AS file_name,
            file.file_access AS file_access,
            apoc.text.split(file.data_category, ';') As data_category,
            file.file_type AS file_type,
            file.file_mapping_level as file_mapping_level,
            file.file_description AS file_description,
            file.file_size AS file_size,
            file.md5sum AS md5sum,
            null AS library_selection,
            null AS library_source_material,
            null AS library_source_molecule,
            null AS library_strategy,
            [file_uid] as files,
            combined_filters as combined_filters
        page_size: 1000

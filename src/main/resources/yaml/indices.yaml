      diagnosis_anatomic_site:
        type: text
        fields:
          keyword:
            type: keyword
      file_types:
        type: text
        fields:
          keyword:
            type: keyword
      files:
        type: text
        fields:
          keyword:
            type: keyword
      # Data availability fields for Hub Studies table
      num_of_study_files:
        type: integer
      num_of_participant_files:
        type: integer
      num_of_sample_files:
        type: integer
      num_of_publications:
        type: integer
    # Cypher queries will be used to retrieve data from Neo4j, and index into Elasticsearch.
    # Uses the GC initial_query + update_queries pattern: initial_query seeds the index with
    # primary keys, then each update_query is applied independently and merged into the
    # corresponding OS document by `id`.
    initial_query:
      query: |
        MATCH (st:study)
        WITH st
        SKIP $skip LIMIT $limit
        RETURN st.guid AS guid
      page_size: 1000
    update_queries:
      - name: "study_properties"
        query: |
          MATCH (st:study)
          WITH st
          SKIP $skip LIMIT $limit
          RETURN
            st.guid AS guid,
            st.study_id AS study_id,
            st.dbgap_accession AS dbgap_accession,
            st.study_status AS study_status,
            st.study_name AS study_name,
            st.study_description AS study_description,
            st.study_acronym AS study_acronym,
            st.study_id AS study_id_gs,
            st.study_name AS study_name_gs,
            st.study_status AS study_status_gs
        page_size: 1000
      - name: "study_funding"
        query: |
          MATCH (st:study)
          WITH st
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (st)<-[:of_study_funding]-(stf:study_funding)
          WITH st, COLLECT(DISTINCT stf.grant_id) AS grant_ids
          RETURN
            st.guid AS guid,
            apoc.text.join([g IN grant_ids WHERE g IS NOT NULL], ';') AS grant_id
        page_size: 1000
      - name: "study_personnel"
        query: |
          MATCH (st:study)
          WITH st
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (st)<-[:of_study_personnel]-(stp:study_personnel)
          WHERE stp.personnel_type = 'PI'
          WITH st, COLLECT(DISTINCT stp.personnel_name) AS pis
          RETURN
            st.guid AS guid,
            apoc.text.join([n IN pis WHERE n IS NOT NULL], ';') AS PIs
        page_size: 1000
      - name: "study_publications"
        query: |
          MATCH (st:study)
          WITH st
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (st)<-[:of_publication]-(pub:publication)
          WITH st, [pid IN COLLECT(DISTINCT pub.pubmed_id) WHERE pid IS NOT NULL] AS pub_ids
          RETURN
            st.guid AS guid,
            apoc.text.join(pub_ids, ';') AS pubmed_ids,
            SIZE(pub_ids) AS num_of_publications
        page_size: 1000
      - name: "num_of_participants"
        query: |
          MATCH (st:study)
          WITH st
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (st)<-[:of_consent_group]-(:consent_group)<-[:of_participant]-(p:participant)
          RETURN
            st.guid AS guid,
            COUNT(DISTINCT p) AS num_of_participants
        page_size: 1000
      - name: "num_of_samples"
        query: |
          MATCH (st:study)
          WITH st
          SKIP $skip LIMIT $limit
          // direct-from-participant samples + cell_line/pdx-derived samples
          OPTIONAL MATCH (st)<-[*..2]-(pcp)<-[:of_sample]-(sm1:sample)
          WHERE (pcp:participant OR pcp:cell_line OR pcp:pdx)
          WITH st, COUNT(DISTINCT sm1.sample_id) AS num_samples_1
          OPTIONAL MATCH
            (st)<-[:of_consent_group]-(:consent_group)<-[:of_participant]-(:participant)<-[:of_sample]-(:sample)<--(cp)<--(sm2:sample)
          WHERE (cp:cell_line OR cp:pdx)
          WITH st, num_samples_1, COUNT(DISTINCT sm2.sample_id) AS num_samples_2
          RETURN
            st.guid AS guid,
            num_samples_1 + num_samples_2 AS num_of_samples
        page_size: 1000
      - name: "diagnosis_aggregations"
        query: |
          MATCH (st:study)
          WITH st
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (st)<-[*..6]-(dg:diagnosis)
          WITH st, COUNT(DISTINCT dg) AS num_diag
          OPTIONAL MATCH (st)<-[*..6]-(dg:diagnosis)
          WITH st, num_diag, dg.diagnosis AS dg_cancer, COUNT(dg.diagnosis) AS num_cancers
          ORDER BY num_cancers DESC
          WITH st, num_diag, COLLECT(dg_cancer + ' (' + toString(num_cancers) + ')') AS cancers
          OPTIONAL MATCH (st)<-[*..6]-(diag:diagnosis)
          WITH st, num_diag, cancers, apoc.text.split(diag.anatomic_site, ';') AS dg_sites
          UNWIND dg_sites AS dg_site
          WITH st, num_diag, cancers, dg_site, COUNT(dg_site) AS num_sites
          ORDER BY num_sites DESC
          WITH st, num_diag, cancers, COLLECT(dg_site + ' (' + toString(num_sites) + ')') AS sites
          RETURN
            st.guid AS guid,
            num_diag AS num_of_diagnoses,
            cancers AS diagnosis_cancer,
            sites AS diagnosis_anatomic_site
        page_size: 1000
      - name: "file_aggregations"
        query: |
          MATCH (st:study)
          WITH st
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (st)<-[*..6]-(fl)
          WHERE (fl:clinical_measure_file OR fl:generic_file OR fl:sequencing_file OR fl:pathology_file OR fl:radiology_file OR fl:methylation_array_file OR fl:cytogenomic_file)
          WITH st,
               fl.file_type AS ft,
               COUNT(DISTINCT fl.dcf_indexd_guid) AS num_ft,
               COLLECT(DISTINCT fl.dcf_indexd_guid) AS ft_guids
          ORDER BY num_ft DESC
          WITH st,
               COLLECT(ft + ' (' + toString(num_ft) + ')') AS file_types,
               apoc.coll.toSet(apoc.coll.flatten(COLLECT(ft_guids))) AS all_guids
          OPTIONAL MATCH (st)<-[*..6]-(file)
          WHERE (file:clinical_measure_file OR file:generic_file OR file:sequencing_file OR file:pathology_file OR file:radiology_file OR file:methylation_array_file OR file:cytogenomic_file)
          WITH st, file_types, all_guids,
               file.dcf_indexd_guid AS file_id,
               file.file_mapping_level AS file_level
          WITH st, file_types, all_guids,
               COLLECT(DISTINCT file_id) AS all_file_ids,
               COUNT(DISTINCT CASE WHEN file_level = 'Study'       THEN file_id END) AS num_study_files,
               COUNT(DISTINCT CASE WHEN file_level = 'Participant' THEN file_id END) AS num_participant_files,
               COUNT(DISTINCT CASE WHEN file_level = 'Sample'      THEN file_id END) AS num_sample_files
          RETURN
            st.guid AS guid,
            file_types AS file_types,
            SIZE(all_guids) AS num_of_files,
            all_file_ids AS files,
            num_study_files       AS num_of_study_files,
            num_participant_files AS num_of_participant_files,
            num_sample_files      AS num_of_sample_files
        page_size: 1000
  
  - index_name: samples_table
    id_field: "guid"
    mapping:
      guid: # a.k.a sample primary key
        type: keyword
      sample_id:
        type: keyword
      # Participant fields
      pid: # a.k.a participant_pk
        type: keyword
      participant_id:
        type: keyword
      race:
        type: keyword
      sex_at_birth:
        type: keyword
      # Study fields
      study_id:
        type: keyword
      dbgap_accession:
        type: keyword
      study_status:
        type: keyword
      study_acronym:
        type: keyword
      study_name:
        type: keyword
      # Sample fields
      sample_anatomic_site:
        type: keyword
      sample_anatomic_site_str:
        type: keyword     
      participant_age_at_collection:
        type: integer
      sample_tumor_status:
        type: keyword
      tumor_classification:
        type: keyword
      # Diagnosis filters
      diagnosis_filters:
        type: nested
        properties:
          age_at_diagnosis:
            type: integer
          diagnosis_anatomic_site:
            type: keyword
          disease_phase:
            type: keyword
          diagnosis_classification_system:
            type: keyword
          diagnosis_basis:
            type: keyword   
          diagnosis:
            type: keyword
          diagnosis_category:
            type: keyword
      # Genetic Analysis filters
      genetic_analysis_filters:
        type: nested
        properties:
          reported_significance:
            type: keyword
          reported_significance_system:
            type: keyword
          gene_symbol:
            type: keyword
          alteration:
            type: keyword
          fusion_partner_gene:
            type: keyword
          alteration_type:
            type: keyword
          status:
            type: keyword
      # File filters
      file_filters:
        type: nested
        properties:
          data_category:
            type: keyword
          file_type:
            type: keyword
          file_mapping_level:
            type: keyword            
          library_selection:
            type: keyword
          library_source_material:
            type: keyword
          library_source_molecule:
            type: keyword
          library_strategy:
            type: keyword
      # Survival filters
      survival_filters:
        type: nested
        properties:
          last_known_survival_status:
            type: keyword
          age_at_last_known_survival_status:
            type: integer
          cause_of_death:
            type: keyword
          first_event:
            type: keyword
      # Treatment filters
      treatment_filters:
        type: nested
        properties:
          treatment_type:
            type: keyword
          treatment_agent:
            type: keyword
          age_at_treatment_start:
            type: integer
          age_at_treatment_end:
            type: integer
      # Treatment response filters
      treatment_response_filters:
        type: nested
        properties:
          age_at_response:
            type: integer
          response:
            type: keyword
          response_category:
            type: keyword
          response_system:
            type: keyword
      file_count:
        type: integer
      direct_file_count:
        type: integer
      files:
        type: text
        fields:
          keyword:
            type: keyword
    # Cypher queries will be used to retrieve data from Neo4j, and index into Elasticsearch.
    # Uses the GC initial_query + update_queries pattern: initial_query seeds the index with
    # primary keys, then each update_query is applied independently and merged into the
    # corresponding OS document by `id`.
    initial_query:
      query: |
        MATCH (sm:sample)
        WITH sm
        SKIP $skip LIMIT $limit
        RETURN sm.guid AS guid
      page_size: 1000
    update_queries:
      - name: "sample_properties"
        query: |
          MATCH (sm:sample)
          WITH sm
          SKIP $skip LIMIT $limit
          RETURN
            sm.guid AS guid,
            sm.sample_id AS sample_id,
            apoc.text.split(sm.anatomic_site, ';') AS sample_anatomic_site,
            sm.anatomic_site AS sample_anatomic_site_str,
            sm.participant_age_at_collection AS participant_age_at_collection,
            sm.sample_tumor_status AS sample_tumor_status,
            sm.tumor_classification AS tumor_classification
        page_size: 1000
      - name: "participant_properties"
        query: |
          MATCH (sm:sample)
          WITH sm
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (sm)-[*..3]->(p:participant)
          RETURN
            sm.guid AS guid,
            p.guid AS pid,
            p.participant_id AS participant_id,
            p.race AS race,
            p.sex_at_birth AS sex_at_birth
        page_size: 1000
      - name: "study_properties"
        query: |
          MATCH (sm:sample)
          WITH sm
          SKIP $skip LIMIT $limit
          // study reachable via participant->consent_group OR via cell_line/pdx
          OPTIONAL MATCH (sm)-[*..5]->(st:study)
          WITH sm, st LIMIT 1
          RETURN
            sm.guid AS guid,
            st.study_id AS study_id,
            st.dbgap_accession AS dbgap_accession,
            st.study_phase AS study_status,
            st.study_acronym AS study_acronym,
            st.study_name AS study_name
        page_size: 1000
      - name: "diagnosis_filters"
        query: |
          MATCH (sm:sample)
          WITH sm
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (sm)-[*..3]->(:participant)<--(dg1:diagnosis)
          WITH sm, COLLECT(DISTINCT {
            age_at_diagnosis: dg1.age_at_diagnosis,
            diagnosis_anatomic_site: apoc.text.split(dg1.anatomic_site, ';'),
            disease_phase: dg1.disease_phase,
            diagnosis_classification_system: dg1.diagnosis_classification_system,
            diagnosis_category: apoc.text.split(dg1.diagnosis_category, ';'),
            diagnosis_basis: dg1.diagnosis_basis,
            tumor_grade_source: dg1.tumor_grade_source,
            tumor_stage_source: dg1.tumor_stage_source,
            diagnosis: dg1.diagnosis
          }) AS dg1_filters
          OPTIONAL MATCH (sm)<-[*..3]-(dg2:diagnosis)
          WITH sm, dg1_filters, COLLECT(DISTINCT {
            age_at_diagnosis: dg2.age_at_diagnosis,
            diagnosis_anatomic_site: apoc.text.split(dg2.anatomic_site, ';'),
            disease_phase: dg2.disease_phase,
            diagnosis_classification_system: dg2.diagnosis_classification_system,
            diagnosis_category: apoc.text.split(dg2.diagnosis_category, ';'),
            diagnosis_basis: dg2.diagnosis_basis,
            tumor_grade_source: dg2.tumor_grade_source,
            tumor_stage_source: dg2.tumor_stage_source,
            diagnosis: dg2.diagnosis
          }) AS dg2_filters
          WITH sm,
               [f IN apoc.coll.union(dg1_filters, dg2_filters) WHERE f.diagnosis IS NOT NULL OR f.age_at_diagnosis IS NOT NULL] AS diagnosis_filters
          RETURN
            sm.guid AS guid,
            diagnosis_filters AS diagnosis_filters
        page_size: 1000
      - name: "genetic_analysis_filters"
        query: |
          MATCH (sm:sample)
          WITH sm
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (sm)-[*..3]->(:participant)<--(ga1:genetic_analysis)
          WITH sm, COLLECT(DISTINCT {
            reported_significance: ga1.reported_significance,
            reported_significance_system: ga1.reported_significance_system,
            gene_symbol: CASE WHEN ga1 IS NOT NULL THEN apoc.coll.toSet(CASE
                                WHEN ga1.gene_symbol STARTS WITH '[' AND ga1.gene_symbol ENDS WITH ']' THEN
                                  [x IN split(replace(substring(ga1.gene_symbol, 1, size(ga1.gene_symbol)-2), "'", ""), ",") |
                                    CASE
                                      WHEN apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') = ''
                                      THEN 'Not Reported'
                                      ELSE apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '')
                                    END
                                  ]
                                ELSE
                                  [CASE
                                    WHEN apoc.text.replace(trim(ga1.gene_symbol), '^[^A-Za-z0-9]+', '') = ''
                                    THEN 'Not Reported'
                                    ELSE apoc.text.replace(trim(ga1.gene_symbol), '^[^A-Za-z0-9]+', '')
                                  END]
                              END) ELSE null END,
            alteration: ga1.alteration,
            fusion_partner_gene: ga1.fusion_partner_gene,
            alteration_type: ga1.alteration_type,
            status: ga1.status
          }) AS ga1_filters
          OPTIONAL MATCH (sm)<-[*..3]-(ga2:genetic_analysis)
          WITH sm, ga1_filters, COLLECT(DISTINCT {
            reported_significance: ga2.reported_significance,
            reported_significance_system: ga2.reported_significance_system,
            gene_symbol: CASE WHEN ga2 IS NOT NULL THEN apoc.coll.toSet(CASE
                                WHEN ga2.gene_symbol STARTS WITH '[' AND ga2.gene_symbol ENDS WITH ']' THEN
                                  [x IN split(replace(substring(ga2.gene_symbol, 1, size(ga2.gene_symbol)-2), "'", ""), ",") |
                                    CASE
                                      WHEN apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') = ''
                                      THEN 'Not Reported'
                                      ELSE apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '')
                                    END
                                  ]
                                ELSE
                                  [CASE
                                    WHEN apoc.text.replace(trim(ga2.gene_symbol), '^[^A-Za-z0-9]+', '') = ''
                                    THEN 'Not Reported'
                                    ELSE apoc.text.replace(trim(ga2.gene_symbol), '^[^A-Za-z0-9]+', '')
                                  END]
                              END) ELSE null END,
            alteration: ga2.alteration,
            fusion_partner_gene: ga2.fusion_partner_gene,
            alteration_type: ga2.alteration_type,
            status: ga2.status
          }) AS ga2_filters
          WITH sm,
               [f IN apoc.coll.union(ga1_filters, ga2_filters) WHERE f.alteration IS NOT NULL OR f.gene_symbol IS NOT NULL OR f.alteration_type IS NOT NULL OR f.status IS NOT NULL OR f.reported_significance IS NOT NULL] AS genetic_analysis_filters
          RETURN
            sm.guid AS guid,
            genetic_analysis_filters AS genetic_analysis_filters
        page_size: 1000
      - name: "file_filters_and_files"
        query: |
          MATCH (sm:sample)
          WITH sm
          SKIP $skip LIMIT $limit
          // Study-level files (clinical_measure / generic) reachable via either path
          OPTIONAL MATCH (sm)-[*..5]->(st:study)<--(stfile)
          WHERE (stfile:clinical_measure_file OR stfile:generic_file)
          WITH sm, COLLECT(DISTINCT {
            data_category: apoc.text.split(stfile.data_category, ';'),
            file_type: stfile.file_type,
            file_mapping_level: stfile.file_mapping_level,
            library_selection: null,
            library_source_material: null,
            library_source_molecule: null,
            library_strategy: null
          }) AS f_study,
          COLLECT(DISTINCT stfile.dcf_indexd_guid) AS guid_study
          // Participant-level files (clinical_measure / generic / radiology)
          OPTIONAL MATCH (sm)-[*..3]->(:participant)<--(pfile)
          WHERE (pfile:clinical_measure_file OR pfile:generic_file OR pfile:radiology_file)
          WITH sm, f_study, guid_study, COLLECT(DISTINCT {
            data_category: apoc.text.split(pfile.data_category, ';'),
            file_type: pfile.file_type,
            file_mapping_level: pfile.file_mapping_level,
            library_selection: null,
            library_source_material: null,
            library_source_molecule: null,
            library_strategy: null
          }) AS f_part,
          COLLECT(DISTINCT pfile.dcf_indexd_guid) AS guid_part
          // Sample-level sequencing files (with library_*)
          OPTIONAL MATCH (sm)<-[*..3]-(seqfile:sequencing_file)
          WITH sm, f_study, f_part, guid_study, guid_part, COLLECT(DISTINCT {
            data_category: apoc.text.split(seqfile.data_category, ';'),
            file_type: seqfile.file_type,
            file_mapping_level: seqfile.file_mapping_level,
            library_selection: seqfile.library_selection,
            library_source_material: seqfile.library_source_material,
            library_source_molecule: seqfile.library_source_molecule,
            library_strategy: seqfile.library_strategy
          }) AS f_seq,
          COLLECT(DISTINCT seqfile.dcf_indexd_guid) AS guid_seq
          // Sample-level non-sequencing files (generic / pathology / cytogenomic / methylation_array)
          OPTIONAL MATCH (sm)<-[*..3]-(otherfile)
          WHERE (otherfile:generic_file OR otherfile:pathology_file OR otherfile:cytogenomic_file OR otherfile:methylation_array_file)
          WITH sm, f_study, f_part, f_seq, guid_study, guid_part, guid_seq, COLLECT(DISTINCT {
            data_category: apoc.text.split(otherfile.data_category, ';'),
            file_type: otherfile.file_type,
            file_mapping_level: otherfile.file_mapping_level,
            library_selection: null,
            library_source_material: null,
            library_source_molecule: null,
            library_strategy: null
          }) AS f_other,
          COLLECT(DISTINCT otherfile.dcf_indexd_guid) AS guid_other
          WITH sm,
               [f IN apoc.coll.union(apoc.coll.union(apoc.coll.union(f_study, f_part), f_seq), f_other) WHERE f.file_type IS NOT NULL] AS file_filters,
               [g IN apoc.coll.toSet(apoc.coll.flatten([guid_study, guid_part, guid_seq, guid_other])) WHERE g IS NOT NULL] AS files
          RETURN
            sm.guid AS guid,
            file_filters AS file_filters,
            files AS files,
            SIZE(files) AS file_count
        page_size: 1000
      - name: "direct_file_count"
        query: |
          MATCH (sm:sample)
          WITH sm
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (sm)<--(direct_file)
          WHERE (direct_file:sequencing_file OR direct_file:generic_file OR direct_file:pathology_file OR direct_file:methylation_array_file OR direct_file:cytogenomic_file)
          RETURN
            sm.guid AS guid,
            COUNT(DISTINCT direct_file.dcf_indexd_guid) AS direct_file_count
        page_size: 1000
      - name: "survival_filters"
        query: |
          MATCH (sm:sample)
          WITH sm
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (sm)-[*..3]->(:participant)<-[:of_survival]-(su:survival)
          WITH
            sm.guid AS guid,
            count(su) AS su_count,
            coalesce(
              [item IN collect(DISTINCT {
                last_known_survival_status: su.last_known_survival_status,
                cause_of_death: su.cause_of_death,
                first_event: su.first_event,
                age_at_last_known_survival_status: su.age_at_last_known_survival_status
              }) WHERE item.last_known_survival_status IS NOT NULL OR item.cause_of_death IS NOT NULL OR item.first_event IS NOT NULL OR item.age_at_last_known_survival_status IS NOT NULL],
              []
            ) AS survival_filters
          WITH
            guid,
            CASE WHEN su_count > 0 THEN survival_filters ELSE [] END AS survival_filters
          RETURN guid, survival_filters
        page_size: 1000
      - name: "treatment_filters"
        query: |
          MATCH (sm:sample)
          WITH sm
          SKIP $skip LIMIT $limit
          // Build a superlist of treatment filters across the 4 treatment subtypes,
          // following Joon's count-gated coalesce + UNION pattern (PR #11).
          CALL {
            WITH sm
            OPTIONAL MATCH (sm)-[*..3]->(p:participant)<-[:of_treatment_chemotherapy]-(tchemo:treatment_chemotherapy)
            WITH
              sm.guid AS guid,
              count(tchemo) AS tchemo_count,
              coalesce(
                [item IN collect(DISTINCT {
                  treatment_type: tchemo.chemotherapy_type,
                  treatment_agent: coalesce(tchemo.chemotherapy_agent, 'Not Reported'),
                  age_at_treatment_start: tchemo.age_at_treatment_start,
                  age_at_treatment_end: tchemo.age_at_treatment_end
                }) WHERE item IS NOT NULL],
                []
              ) AS treatment_filters
            WITH
              guid,
              CASE WHEN tchemo_count > 0 THEN treatment_filters ELSE [] END AS treatment_filters
            RETURN guid, treatment_filters

            UNION

            WITH sm
            OPTIONAL MATCH (sm)-[*..3]->(p:participant)<-[:of_treatment_radiation]-(trad:treatment_radiation)
            WITH
              sm.guid AS guid,
              count(trad) AS trad_count,
              coalesce(
                [item IN collect(DISTINCT {
                  treatment_type: trad.treatment_type,
                  treatment_agent: trad.radiation_therapy_type,
                  age_at_treatment_start: trad.age_at_treatment_start,
                  age_at_treatment_end: trad.age_at_treatment_end
                }) WHERE item IS NOT NULL],
                []
              ) AS treatment_filters
            WITH
              guid,
              CASE WHEN trad_count > 0 THEN treatment_filters ELSE [] END AS treatment_filters
            RETURN guid, treatment_filters

            UNION

            WITH sm
            OPTIONAL MATCH (sm)-[*..3]->(p:participant)<-[:of_treatment_surgery]-(tsurg:treatment_surgery)
            WITH
              sm.guid AS guid,
              count(tsurg) AS tsurg_count,
              coalesce(
                [item IN collect(DISTINCT {
                  treatment_type: tsurg.treatment_type,
                  treatment_agent: tsurg.surgery_type,
                  age_at_treatment_start: tsurg.age_at_treatment_start,
                  age_at_treatment_end: tsurg.age_at_treatment_end
                }) WHERE item IS NOT NULL],
                []
              ) AS treatment_filters
            WITH
              guid,
              CASE WHEN tsurg_count > 0 THEN treatment_filters ELSE [] END AS treatment_filters
            RETURN guid, treatment_filters

            UNION

            WITH sm
            OPTIONAL MATCH (sm)-[*..3]->(p:participant)<-[:of_treatment_other]-(toth:treatment_other)
            WITH
              sm.guid AS guid,
              count(toth) AS toth_count,
              coalesce(
                [item IN collect(DISTINCT {
                  treatment_type: toth.treatment_type,
                  treatment_agent: toth.other_treatment_type,
                  age_at_treatment_start: toth.age_at_treatment_start,
                  age_at_treatment_end: toth.age_at_treatment_end
                }) WHERE item IS NOT NULL],
                []
              ) AS treatment_filters
            WITH
              guid,
              CASE WHEN toth_count > 0 THEN treatment_filters ELSE [] END AS treatment_filters
            RETURN guid, treatment_filters
          }
          WITH guid, collect(treatment_filters) AS treatment_filters_superlist
          WITH
            guid,
            reduce(all_filters = [], filters IN treatment_filters_superlist | all_filters + filters) AS treatment_filters
          RETURN guid, treatment_filters
        page_size: 1000
      - name: "treatment_response_filters"
        query: |
          MATCH (sm:sample)
          WITH sm
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (sm)-[*..3]->(:participant)<-[:of_treatment_response]-(tresp:treatment_response)
          WITH
            sm.guid AS guid,
            count(tresp) AS tresp_count,
            coalesce(
              [item IN collect(DISTINCT {
                age_at_response: tresp.age_at_response,
                response: tresp.response,
                response_category: tresp.response_category,
                response_system: tresp.response_system
              }) WHERE item.response IS NOT NULL OR item.age_at_response IS NOT NULL OR item.response_category IS NOT NULL OR item.response_system IS NOT NULL],
              []
            ) AS treatment_response_filters
          WITH
            guid,
            CASE WHEN tresp_count > 0 THEN treatment_response_filters ELSE [] END AS treatment_response_filters
          RETURN guid, treatment_response_filters
        page_size: 1000


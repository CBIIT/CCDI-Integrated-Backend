            sample_tumor_status: case when row.sm is not null then row.sm.sample_tumor_status else null end,
            tumor_classification: case when row.sm is not null then row.sm.tumor_classification else null end,
            // Diagnosis facets
            age_at_diagnosis: case when row.dg is not null then row.dg.age_at_diagnosis else null end,
            diagnosis_anatomic_site: case when row.dg is not null then apoc.text.split(row.dg.anatomic_site, ';') else null end,
            disease_phase: case when row.dg is not null then row.dg.disease_phase else null end,
            diagnosis_classification_system: case when row.dg is not null then row.dg.diagnosis_classification_system else null end,
            diagnosis_category: case when row.dg is not null then apoc.text.split(row.dg.diagnosis_category, ';') else null end,
            diagnosis_basis: case when row.dg is not null then row.dg.diagnosis_basis else null end,
            diagnosis: case when row.dg is not null then row.dg.diagnosis else null end,
            // Genetic Analysis facets
            reported_significance: case when row.ga is not null then row.ga.reported_significance else null end,
            reported_significance_system: case when row.ga is not null then row.ga.reported_significance_system else null end,
            gene_symbol: case when row.ga is not null then apoc.coll.toSet(CASE
                                  WHEN row.ga.gene_symbol STARTS WITH '[' AND row.ga.gene_symbol ENDS WITH ']' THEN
                                    [x IN split(replace(substring(row.ga.gene_symbol, 1, size(row.ga.gene_symbol)-2), "'", ""), ",") | 
                                      CASE 
                                        WHEN apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') = '' 
                                        THEN 'Not Reported' 
                                        ELSE apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') 
                                      END
                                    ]
                                  ELSE
                                    [CASE 
                                      WHEN apoc.text.replace(trim(row.ga.gene_symbol), '^[^A-Za-z0-9]+', '') = '' 
                                      THEN 'Not Reported' 
                                      ELSE apoc.text.replace(trim(row.ga.gene_symbol), '^[^A-Za-z0-9]+', '') 
                                    END]
                                END) else null end,
            alteration: case when row.ga is not null then row.ga.alteration else null end,
            fusion_partner_gene: case when row.ga is not null then row.ga.fusion_partner_gene else null end,
            alteration_type: case when row.ga is not null then row.ga.alteration_type else null end,
            status: case when row.ga is not null then row.ga.status else null end,
            // File facets
            data_category: case when row.file is not null then apoc.text.split(row.file.data_category, ';') else null end,
            file_type: case when row.file is not null then row.file.file_type else null end,
            file_mapping_level: case when row.file is not null then row.file.file_mapping_level else null end,
            library_selection: case when row.file is not null and size(labels(row.file)) > 0 and labels(row.file)[0] = 'sequencing_file' then row.file.library_selection else null end,
            library_source_material: case when row.file is not null and size(labels(row.file)) > 0 and labels(row.file)[0] = 'sequencing_file' then row.file.library_source_material else null end,
            library_source_molecule: case when row.file is not null and size(labels(row.file)) > 0 and labels(row.file)[0] = 'sequencing_file' then row.file.library_source_molecule else null end,
            library_strategy: case when row.file is not null and size(labels(row.file)) > 0 and labels(row.file)[0] = 'sequencing_file' then row.file.library_strategy else null end
          }) as sample_diagnosis_genetic_analysis_file_filter
          OPTIONAL MATCH (st)<--(:consent_group)<--(p)
          OPTIONAL MATCH (p)<-[:of_survival]-(su:survival)
          OPTIONAL MATCH (p)<-[:of_treatment]-(tr:treatment)
          OPTIONAL MATCH (p)<-[:of_treatment_response]-(tresp:treatment_response)
          WITH st, p, sample_diagnosis_genetic_analysis_file_filter,
          CASE WHEN su IS NOT NULL THEN COLLECT(DISTINCT {last_known_survival_status: su.last_known_survival_status, 
            cause_of_death: su.cause_of_death, 
            first_event: su.first_event,
            age_at_last_known_survival_status: su.age_at_last_known_survival_status} ) ELSE [] END as survival_filters,
          CASE WHEN tr IS NOT NULL THEN COLLECT(DISTINCT{
            treatment_type: apoc.text.split(tr.treatment_type, ';'),
            treatment_agent: apoc.text.split(tr.treatment_agent, ';'),
            age_at_treatment_start: tr.age_at_treatment_start,
            age_at_treatment_end: tr.age_at_treatment_end}) ELSE [] END as treatment_filters,
          CASE WHEN tresp IS NOT NULL THEN COLLECT(DISTINCT{
            age_at_response: tresp.age_at_response,
            response: tresp.response,
            response_category: tresp.response_category,
            response_system: tresp.response_system}) ELSE [] END as treatment_response_filters
          RETURN DISTINCT
            p.id as id,
            p.id as pid,
            p.participant_id as participant_id,
            apoc.text.split(p.race, ';') as race,
            p.sex_at_birth as sex_at_birth,
            st.study_id as study_id,
            st.dbgap_accession as dbgap_accession,
            st.study_status AS study_status,
            st.study_acronym as study_acronym,
            st.study_name as study_name,
            survival_filters as survival_filters,
            treatment_filters as treatment_filters,
            treatment_response_filters as treatment_response_filters,
            sample_diagnosis_genetic_analysis_file_filter AS sample_diagnosis_genetic_analysis_file_filters

  # TODO: Joon to revisit this index based on CCDI model 3.1.0 for now, later on, we will pump up to use CCDI-DCC 1.0.0
  # Data points for KM plot
  # Excludes survival records with bad age_at_last_known_survival_status
  # Excludes survival records associated with bad age_at_diagnosis
  - index_name: km_plot_data
    type: neo4j
    mapping:
      keyword:
        - id
      integer:
        - time
        - event
    cypher_query: >
      MATCH (p:participant)
      OPTIONAL MATCH (p)<-[:of_diagnosis]-(d:diagnosis)
      OPTIONAL MATCH (p)<-[:of_survival]-(sur:survival)
      WITH p, COLLECT(d) AS diagnoses, COLLECT(sur) AS survivals

      WITH
        p,
        diagnoses,
        survivals,
        [diagnosis IN diagnoses
          WHERE diagnosis.age_at_diagnosis IS NOT NULL |
          diagnosis.age_at_diagnosis] AS diag_ages,
        [survival IN survivals
          WHERE survival.age_at_last_known_survival_status IS NOT NULL |
          survival.age_at_last_known_survival_status] AS surv_ages

      WHERE
        NOT ANY(a IN diag_ages WHERE a = -999) AND
        NOT ANY(a IN surv_ages WHERE a = -999) AND
        SIZE(diag_ages) > 0 AND
        SIZE(surv_ages) > 0

      WITH
        p,
        diagnoses,
        survivals,
        REDUCE(
          m = NULL,
          a IN diag_ages |
            CASE
              WHEN m IS NULL OR a < m THEN a
              ELSE m
            END
        ) AS min_diag_age,
        REDUCE(
          m = null,
          a IN surv_ages |
            CASE
              WHEN m IS NULL OR a > m THEN a
              ELSE m
            END
        ) AS max_surv_age

      WHERE min_diag_age <= max_surv_age

      WITH
        p,
        min_diag_age,
        max_surv_age,
        [survival IN survivals
          WHERE survival.age_at_last_known_survival_status = max_surv_age] AS max_survs

      RETURN
        p.id AS id,
        max_surv_age - min_diag_age AS time,
        CASE
          WHEN ANY(surv IN max_survs WHERE surv.last_known_survival_status = "Dead") THEN 1
          ELSE 0
        END AS event;

  # participant index for table display and participant level facets
  - index_name: participants_table
    id_field: "guid"
    mapping:
      keyword:
        - guid
        - participant_id
        - race
        - race_str
        - sex_at_birth
        - study_id
        - dbgap_accession
        - study_status
        - study_acronym
        - study_name
        - survival_filters.last_known_survival_status
        - survival_filters.cause_of_death
        - survival_filters.first_event
        - treatment_filters.treatment_type
        - treatment_filters.treatment_agent
        - treatment_response_filters.response
        - treatment_response_filters.response_category
        - treatment_response_filters.response_system
        - sample_diagnosis_genetic_analysis_file_filters.sample_anatomic_site
        - sample_diagnosis_genetic_analysis_file_filters.sample_tumor_status
        - sample_diagnosis_genetic_analysis_file_filters.tumor_classification
        - sample_diagnosis_genetic_analysis_file_filters.diagnosis
        - sample_diagnosis_genetic_analysis_file_filters.diagnosis_category
        - sample_diagnosis_genetic_analysis_file_filters.diagnosis_anatomic_site
        - sample_diagnosis_genetic_analysis_file_filters.diagnosis_classification_system
        - sample_diagnosis_genetic_analysis_file_filters.diagnosis_basis
        - sample_diagnosis_genetic_analysis_file_filters.disease_phase
        - sample_diagnosis_genetic_analysis_file_filters.reported_significance
        - sample_diagnosis_genetic_analysis_file_filters.reported_significance_system
        - sample_diagnosis_genetic_analysis_file_filters.gene_symbol
        - sample_diagnosis_genetic_analysis_file_filters.alteration
        - sample_diagnosis_genetic_analysis_file_filters.fusion_partner_gene
        - sample_diagnosis_genetic_analysis_file_filters.alteration_type
        - sample_diagnosis_genetic_analysis_file_filters.status
        - sample_diagnosis_genetic_analysis_file_filters.data_category
        - sample_diagnosis_genetic_analysis_file_filters.file_type
        - sample_diagnosis_genetic_analysis_file_filters.file_mapping_level
        - sample_diagnosis_genetic_analysis_file_filters.library_selection
        - sample_diagnosis_genetic_analysis_file_filters.library_source_material
        - sample_diagnosis_genetic_analysis_file_filters.library_source_molecule
        - sample_diagnosis_genetic_analysis_file_filters.library_strategy
      integer:
        - survival_filters.age_at_last_known_survival_status
        - treatment_filters.age_at_treatment_start
        - treatment_filters.age_at_treatment_end
        - treatment_response_filters.age_at_response
        - sample_diagnosis_genetic_analysis_file_filters.participant_age_at_collection
        - sample_diagnosis_genetic_analysis_file_filters.age_at_diagnosis
        - file_count
      text:
        - files
    # Cypher query will be used to retrieve data from Neo4j, and index into Elasticsearch
    initial_query:
      query: |
        MATCH (p:participant)
        WITH p
        SKIP $skip LIMIT $limit
        RETURN p.guid AS guid
      page_size: 1000
    update_queries:
      - name: "study_properties"
        query: |
          MATCH
            // Participant -> Consent Group -> Study
            (p:participant),
            (cg:consent_group)<-[:of_participant]->(p),
            (stu:study)<-[:of_consent_group]-(cg)
          WITH p, stu
          SKIP $skip LIMIT $limit
          RETURN
            p.guid AS guid,
            stu.study_id AS study_id,
            stu.dbgap_accession AS dbgap_accession,
            stu.study_status AS study_status,
            stu.study_acronym AS study_acronym,
            stu.study_name AS study_name
        page_size: 1000
      - name: "participant_properties"
        query: |
          MATCH (p:participant)
          WITH p
          SKIP $skip LIMIT $limit
          RETURN
            p.guid AS guid,
            p.participant_id AS participant_id,
            p.race AS race,
            reduce(result = '', x IN p.race |
              CASE 
                WHEN result = "" THEN x
                ELSE result + ";" + x
              END
            ) AS race_str,
            p.sex_at_birth AS sex_at_birth
        page_size: 1000
      - name: "survival_filters"
        query: |
          MATCH (p:participant)
          WITH p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (sur:survival)-[:of_survival]->(p)
          WITH
            p,
            sur,
            coalesce(
              [item IN collect(
                DISTINCT {
                  last_known_survival_status: sur.last_known_survival_status,
                  cause_of_death: sur.cause_of_death,
                  first_event: sur.first_event,
                  age_at_last_known_survival_status: sur.age_at_last_known_survival_status
                }
              ) WHERE item IS NOT NULL],
              []
            ) AS survival_filters_pre
          WITH
            p,
            CASE
              WHEN sur IS NOT NULL
              THEN survival_filters_pre
              ELSE []
            END AS survival_filters
          RETURN
            p.guid AS guid,
            survival_filters
        page_size: 500
      - name: "treatment_filters"
        query: |
          MATCH (p:participant)
          WITH p
          SKIP $skip LIMIT $limit

          // Build a superlist of treatment filters
          CALL {
            // treatment_chemotherapy
            WITH p
            OPTIONAL MATCH (tchemo:treatment_chemotherapy)-[:of_treatment_chemotherapy]->(p)
            WITH
              p,
              tchemo,
              coalesce(
                [item in collect(
                  DISTINCT {
                    treatment_type: tchemo.chemotherapy_type,
                    treatment_agent: coalesce(tchemo.chemotherapy_agent, 'Not Reported'),
                    age_at_treatment_start: tchemo.age_at_treatment_start,
                    age_at_treatment_end: tchemo.age_at_treatment_end
                  }
                ) WHERE item IS NOT NULL],
                []
              ) AS treatment_filters
            WITH
              p,
              CASE
                WHEN tchemo IS NOT NULL
                THEN treatment_filters
                ELSE []
              END AS treatment_filters
            RETURN
              p.guid AS guid,
              treatment_filters

            UNION

            // treatment_radiation
            WITH p
            OPTIONAL MATCH (trad:treatment_radiation)-[:of_treatment_radiation]->(p)
            WITH
              p,
              trad,
              coalesce(
                [item in collect(
                  DISTINCT {
                    treatment_type: trad.treatment_type,
                    treatment_agent: trad.radiation_therapy_type,
                    age_at_treatment_start: trad.age_at_treatment_start,
                    age_at_treatment_end: trad.age_at_treatment_end
                  }
                ) WHERE item IS NOT NULL],
                []
              ) AS treatment_filters
            WITH
              p,
              CASE
                WHEN trad IS NOT NULL
                THEN treatment_filters
                ELSE []
              END AS treatment_filters
            RETURN
              p.guid AS guid,
              treatment_filters

            UNION

            // treatment_surgery
            WITH p
            OPTIONAL MATCH (tsurg:treatment_surgery)-[:of_treatment_surgery]->(p)
            WITH
              p,
              tsurg,
              coalesce(
                [item in collect(
                  DISTINCT {
                    treatment_type: tsurg.treatment_type,
                    treatment_agent: tsurg.surgery_type,
                    age_at_treatment_start: tsurg.age_at_treatment_start,
                    age_at_treatment_end: tsurg.age_at_treatment_end
                  }
                ) WHERE item IS NOT NULL],
                []
              ) AS treatment_filters
            WITH
              p,
              CASE
                WHEN tsurg IS NOT NULL
                THEN treatment_filters
                ELSE []
              END AS treatment_filters
            RETURN
              p.guid AS guid,
              treatment_filters

            UNION

            // treatment_other
            WITH p
            OPTIONAL MATCH (toth:treatment_other)-[:of_treatment_other]->(p)
            WITH
              p,
              toth,
              coalesce(
                [item in collect(
                  DISTINCT {
                    treatment_type: toth.treatment_type,
                    treatment_agent: toth.other_treatment_type,
                    age_at_treatment_start: toth.age_at_treatment_start,
                    age_at_treatment_end: toth.age_at_treatment_end
                  }
                ) WHERE item IS NOT NULL],
                []
              ) AS treatment_filters
            WITH
              p,
              CASE
                WHEN toth IS NOT NULL
                THEN treatment_filters
                ELSE []
              END AS treatment_filters
            RETURN
              p.guid AS guid,
              treatment_filters
          }
          WITH
            guid,
            collect(treatment_filters) AS treatment_filters_superlist
          WITH
            guid,
            reduce(all_filters = [], filters IN treatment_filters_superlist | all_filters + filters) AS treatment_filters
          RETURN
            guid,
            treatment_filters
        page_size: 500
      - name: "treatment_response_filters"
        query: |
          MATCH (p:participant)
          WITH p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (tresp:treatment_response)-[:of_treatment_response]->(p)
          WITH
            p,
            tresp,
            coalesce(
              [item IN collect(
                DISTINCT {
                  age_at_response: tresp.age_at_response,
                  response: tresp.response,
                  response_category: tresp.response_category,
                  response_system: tresp.response_system
                }
              ) WHERE item IS NOT NULL],
              []
            ) AS treatment_response_filters
          WITH
            p,
            CASE
              WHEN tresp IS NOT NULL
              THEN treatment_response_filters
              ELSE []
            END AS treatment_response_filters
          RETURN
            p.guid AS guid,
            treatment_response_filters
        page_size: 500
      - name: "sample_diagnosis_genetic_analysis_file_filters"
        query: |
          MATCH (p:participant)
          WITH p
          SKIP $skip
          LIMIT $limit

          // Build a superlist of sample_diagnosis_genetic_analysis_file filters
          CALL {
            // combination 1
            WITH p
            OPTIONAL MATCH (p)<--(sm:sample)
            OPTIONAL MATCH (p)<--(file)
            WHERE (file:clinical_measure_file OR file:generic_file OR file:radiology_file)
            OPTIONAL MATCH (p)<--(ga:genetic_analysis)
            OPTIONAL MATCH (p)<--(dg:diagnosis)
            WITH DISTINCT p, sm, file, ga, dg
            WITH
              p.guid AS guid,
              collect(sm) <> [] OR
              collect(file) <> [] OR
              collect(ga) <> [] OR
              collect(dg) <> [] AS has_filter,
              collect(DISTINCT {sm: sm, file: file, dg: dg, ga: ga}) AS sample_diagnosis_genetic_analysis_file_filter
            WITH
              guid,
              CASE
                WHEN has_filter THEN sample_diagnosis_genetic_analysis_file_filter
                ELSE []
              END AS sample_diagnosis_genetic_analysis_file_filter
            RETURN guid, sample_diagnosis_genetic_analysis_file_filter

            UNION

            // combination 2
            WITH p
            OPTIONAL MATCH (p)<--(sm:sample)
            OPTIONAL MATCH (p)<--(file)
            WHERE (file:clinical_measure_file OR file:generic_file OR file:radiology_file)
            OPTIONAL MATCH (sm)<--(ga:genetic_analysis)
            OPTIONAL MATCH (sm)<--(dg:diagnosis)
            WITH
              p.guid AS guid,

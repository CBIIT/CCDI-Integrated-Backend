# Indices settings
Indices:
  # TODO: work on the cypher queries for the index
  - index_name: cohorts
    type: neo4j
    mapping:
      keyword:
        - id
        - participant_id
        - race
        - sex_at_birth
        - consent_group_name
        - consent_group_number
        - study_id
        - dbgap_accession
        - diagnoses.id
        - diagnoses.diagnosis_id
        - diagnoses.anatomic_site
        - diagnoses.diagnosis
        - diagnoses.diagnosis_basis
        - diagnoses.diagnosis_category
        - diagnoses.diagnosis_classification_system
        - diagnoses.diagnosis_comment
        - diagnoses.disease_phase
        - diagnoses.toronto_childhood_cancer_staging
        - diagnoses.tumor_classification
        - diagnoses.tumor_grade
        - diagnoses.tumor_stage_clinical_m
        - diagnoses.tumor_stage_clinical_n
        - diagnoses.tumor_stage_clinical_t
        - genetic_analyses.id
        - genetic_analyses.genetic_analysis_id
        - genetic_analyses.alteration
        - genetic_analyses.alteration_effect
        - genetic_analyses.alteration_type
        - genetic_analyses.chromosome
        - genetic_analyses.cytoband
        - genetic_analyses.exon
        - genetic_analyses.fusion_partner_exon
        - genetic_analyses.fusion_partner_gene
        - genetic_analyses.gene_symbol
        - genetic_analyses.genomic_source_category
        - genetic_analyses.hgvs_coding
        - genetic_analyses.hgvs_genome
        - genetic_analyses.hgvs_protein
        - genetic_analyses.reference_genome
        - genetic_analyses.reported_significance
        - genetic_analyses.reported_significance_system
        - genetic_analyses.status
        - genetic_analyses.test
        - survivals.id
        - survivals.survival_id
        - survivals.cause_of_death
        - survivals.event_free_survival_status
        - survivals.first_event
        - survivals.last_known_survival_status
        - treatments.id
        - treatments.treatment_id
        - treatments.treatment_agent
        - treatments.treatment_type
        - treatment_responses.id
        - treatment_responses.treatment_response_id
        - treatment_responses.response
        - treatment_responses.response_category
        - treatment_responses.response_system
        - samples.id
        - samples.sample_id
        - samples.anatomic_site
        - samples.sample_tumor_status
        - samples.tumor_classification
        - samples.sample_description
        - files.id
        - files.file_id
        - files.file_name
        - files.data_category
        - files.file_type
        - files.file_description
        - files.file_size
        - files.md5sum
        - files.file_access
        - files.dcf_indexd_guid
        - files.library_selection
        - files.library_strategy
        - files.library_source_material
        - files.library_source_molecule
      integer:
        - diagnoses.age_at_diagnosis
        - survivals.age_at_event_free_survival_status
        - survivals.age_at_last_known_survival_status
        - treatments.age_at_treatment_end
        - treatments.age_at_treatment_start
        - treatment_responses.age_at_response
        - samples.participant_age_at_collection
    cypher_queries:
      - query: |
          MATCH (p:participant)-[:of_participant]->(cg:consent_group)-[:of_consent_group]->(stu:study)
          WITH p
          SKIP $skip LIMIT $limit
          OPTIONAL MATCH (d:diagnosis)-[*..4]->(p)
          OPTIONAL MATCH (ga:genetic_analysis)-[*..4]->(p)
          OPTIONAL MATCH (sur:survival)-[:of_survival]->(p)
          OPTIONAL MATCH (t:treatment)-[:of_treatment]->(p)
          OPTIONAL MATCH (tresp:treatment_response)-[:of_treatment_response]->(p)
          OPTIONAL MATCH (s:sample)-[*..4]->(p)
          OPTIONAL MATCH (file)-[*..4]->(p)
          where (file: clinical_measure_file or file: generic_file or file: radiology_file or file: sequencing_file or file: methylation_array_file or file: pathology_file or file: cytogenomic_file)
          RETURN
            p.id AS id,
            p.participant_id AS participant_id,
            p.race AS race,
            p.sex_at_birth AS sex_at_birth,
            cg.consent_group_name AS consent_group_name,
            cg.consent_group_number AS consent_group_number,
            stu.study_id AS study_id,
            stu.dbgap_accession AS dbgap_accession,
            (CASE
              WHEN COUNT(DISTINCT d) > 0 THEN COLLECT(DISTINCT {
                id: d.id,
                diagnosis_id: d.diagnosis_id,
                age_at_diagnosis: d.age_at_diagnosis,
                anatomic_site: d.anatomic_site,
                diagnosis: d.diagnosis,
                diagnosis_basis: d.diagnosis_basis,
                diagnosis_classification_system: d.diagnosis_classification_system,
                diagnosis_comment: d.diagnosis_comment,
                disease_phase: d.disease_phase,
                toronto_childhood_cancer_staging: d.toronto_childhood_cancer_staging,
                tumor_classification: d.tumor_classification,
                diagnosis_category: d.diagnosis_category,
                tumor_grade: d.tumor_grade,
                tumor_stage_clinical_m: d.tumor_stage_clinical_m,
                tumor_stage_clinical_n: d.tumor_stage_clinical_n,
                tumor_stage_clinical_t: d.tumor_stage_clinical_t
              })
              ELSE []
            END) AS diagnoses,
            (CASE
              WHEN COUNT(DISTINCT ga) > 0 THEN COLLECT(DISTINCT {
                id: ga.id,
                genetic_analysis_id: ga.genetic_analysis_id,
                alteration: ga.alteration,
                alteration_effect: ga.alteration_effect,
                alteration_type: ga.alteration_type,
                chromosome: ga.chromosome,
                cytoband: ga.cytoband,
                exon: ga.exon,
                fusion_partner_exon: ga.fusion_partner_exon,
                fusion_partner_gene: ga.fusion_partner_gene,
                gene_symbol: case when ga is not null then apoc.coll.toSet(CASE
                                        WHEN ga.gene_symbol STARTS WITH '[' AND ga.gene_symbol ENDS WITH ']' THEN
                                          [x IN split(replace(substring(ga.gene_symbol, 1, size(ga.gene_symbol)-2), "'", ""), ",") | 
                                            CASE 
                                              WHEN apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') = '' 
                                              THEN 'Not Reported' 
                                              ELSE apoc.text.replace(trim(x), '^[^A-Za-z0-9]+', '') 
                                            END
                                          ]
                                        ELSE
                                          [CASE 
                                            WHEN apoc.text.replace(trim(ga.gene_symbol), '^[^A-Za-z0-9]+', '') = '' 
                                            THEN 'Not Reported' 
                                            ELSE apoc.text.replace(trim(ga.gene_symbol), '^[^A-Za-z0-9]+', '') 
                                          END]
                                        END) else null end,
                genomic_source_category: ga.genomic_source_category,
                hgvs_coding: ga.hgvs_coding,
                hgvs_genome: ga.hgvs_genome,
                hgvs_protein: ga.hgvs_protein,
                reference_genome: ga.reference_genome,
                reported_significance: ga.reported_significance,
                reported_significance_system: ga.reported_significance_system,
                status: ga.status,
                test: ga.test
              })
              ELSE []
            END) AS genetic_analyses,
            (CASE
              WHEN COUNT(DISTINCT sur) > 0 THEN COLLECT(DISTINCT {
                id: sur.id,
                survival_id: sur.survival_id,
                age_at_event_free_survival_status: sur.age_at_event_free_survival_status,
                age_at_last_known_survival_status: sur.age_at_last_known_survival_status,
                cause_of_death: sur.cause_of_death,
                event_free_survival_status: sur.event_free_survival_status,
                first_event: sur.first_event,
                last_known_survival_status: sur.last_known_survival_status
              })
              ELSE []
            END) AS survivals,
            (CASE
              WHEN COUNT(DISTINCT t) > 0 THEN COLLECT(DISTINCT {
                id: t.id,
                treatment_id: t.treatment_id,
                age_at_treatment_end: t.age_at_treatment_end,
                age_at_treatment_start: t.age_at_treatment_start,
                treatment_agent: apoc.text.split(t.treatment_agent, ';'),
                treatment_type: t.treatment_type
              })
              ELSE []
            END) AS treatments,
            (CASE
              WHEN COUNT(DISTINCT tresp) > 0 THEN COLLECT(DISTINCT {
                id: tresp.id,
                treatment_response_id: tresp.treatment_response_id,
                age_at_response: tresp.age_at_response,
                response: tresp.response,
                response_category: tresp.response_category,
                response_system: tresp.response_system
              })
              ELSE []
            END) AS treatment_responses,
            (CASE
              WHEN COUNT(DISTINCT s) > 0 THEN COLLECT(DISTINCT {
                id: s.id,
                sample_id: s.sample_id,
                anatomic_site: s.anatomic_site,
                participant_age_at_collection: s.participant_age_at_collection,
                sample_tumor_status: s.sample_tumor_status,
                tumor_classification: s.tumor_classification,
                sample_description: s.sample_description
              })
              ELSE []
            END) AS samples,
            (CASE
              WHEN COUNT(DISTINCT file) > 0 THEN COLLECT(DISTINCT {
                id: file.dcf_indexd_guid,
                file_id: CASE LABELS(file)[0]
                      WHEN 'clinical_measure_file' THEN file.dcf_indexd_guid
                      WHEN 'generic_file' THEN file.dcf_indexd_guid
                      WHEN 'radiology_file' THEN file.dcf_indexd_guid
                      WHEN 'sequencing_file' THEN file.dcf_indexd_guid
                      WHEN 'methylation_array_file' THEN file.dcf_indexd_guid
                      WHEN 'pathology_file' THEN file.dcf_indexd_guid
                      WHEN 'cytogenomic_file' THEN file.dcf_indexd_guid
                      ELSE null END,
                dcf_indexd_guid: file.dcf_indexd_guid,
                file_name: file.file_name,
                file_access: file.file_access,
                data_category: file.data_category,
                file_type: file.file_type,
                file_description: file.file_description,
                file_size: file.file_size,
                md5sum: file.md5sum,
                library_selection: CASE LABELS(file)[0]
                                    WHEN 'sequencing_file' THEN file.library_selection
                                    ELSE null END,
                library_source_material: CASE LABELS(file)[0]
                                    WHEN 'sequencing_file' THEN file.library_source_material
                                    ELSE null END,
                library_source_molecule: CASE LABELS(file)[0]
                                    WHEN 'sequencing_file' THEN file.library_source_molecule
                                    ELSE null END,
                library_strategy: CASE LABELS(file)[0]
                                    WHEN 'sequencing_file' THEN file.library_strategy
                                    ELSE null END
              })
              ELSE []
            END) AS files
        page_size: 100

  # participant centric index for study and other facets
  - index_name: study_participants_faceted
    type: neo4j
    mapping:
      keyword:
        - id
        - pid
        - participant_id
        - race
        - sex_at_birth
        - study_id
        - dbgap_accession
        - study_status
        - study_acronym
        - study_name
        - survival_filters.last_known_survival_status
        - survival_filters.cause_of_death
        - survival_filters.first_event
        - treatment_filters.treatment_type
        - treatment_filters.treatment_agent
        - treatment_response_filters.response
        - treatment_response_filters.response_category
        - treatment_response_filters.response_system
        - sample_diagnosis_genetic_analysis_file_filters.sample_anatomic_site
        - sample_diagnosis_genetic_analysis_file_filters.sample_tumor_status
        - sample_diagnosis_genetic_analysis_file_filters.tumor_classification
        - sample_diagnosis_genetic_analysis_file_filters.diagnosis
        - sample_diagnosis_genetic_analysis_file_filters.diagnosis_category
        - sample_diagnosis_genetic_analysis_file_filters.diagnosis_anatomic_site
        - sample_diagnosis_genetic_analysis_file_filters.diagnosis_classification_system
        - sample_diagnosis_genetic_analysis_file_filters.diagnosis_basis
        - sample_diagnosis_genetic_analysis_file_filters.disease_phase
        - sample_diagnosis_genetic_analysis_file_filters.reported_significance
        - sample_diagnosis_genetic_analysis_file_filters.reported_significance_system
        - sample_diagnosis_genetic_analysis_file_filters.gene_symbol
        - sample_diagnosis_genetic_analysis_file_filters.alteration
        - sample_diagnosis_genetic_analysis_file_filters.fusion_partner_gene
        - sample_diagnosis_genetic_analysis_file_filters.alteration_type
        - sample_diagnosis_genetic_analysis_file_filters.status
        - sample_diagnosis_genetic_analysis_file_filters.data_category
        - sample_diagnosis_genetic_analysis_file_filters.file_type
        - sample_diagnosis_genetic_analysis_file_filters.file_mapping_level
        - sample_diagnosis_genetic_analysis_file_filters.library_selection
        - sample_diagnosis_genetic_analysis_file_filters.library_source_material
        - sample_diagnosis_genetic_analysis_file_filters.library_source_molecule
        - sample_diagnosis_genetic_analysis_file_filters.library_strategy
      integer:
        - survival_filters.age_at_last_known_survival_status
        - treatment_filters.age_at_treatment_start
        - treatment_filters.age_at_treatment_end
        - treatment_response_filters.age_at_response
        - sample_diagnosis_genetic_analysis_file_filters.participant_age_at_collection
        - sample_diagnosis_genetic_analysis_file_filters.age_at_diagnosis
    # Cypher query will be used to retrieve data from Neo4j, and index into Elasticsearch
    cypher_queries:
      - query: |
          MATCH (p:participant)
          WITH p
          SKIP $skip LIMIT $limit
          // combination 1
          optional match (p)<--(sm:sample)
          optional match (p)<--(file)
          where (file: clinical_measure_file or file:generic_file or file: radiology_file)
          optional match (p)<--(ga:genetic_analysis)
          optional match (p)<--(dg:diagnosis)
          with distinct p, sm, file, ga, dg
          with p, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter
          // combination 2
          optional match (p)<--(sm:sample)
          optional match (p)<--(file)
          where (file: clinical_measure_file or file:generic_file or file: radiology_file)
          optional match (sm)<--(ga:genetic_analysis)
          optional match (sm)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_genetic_analysis_file_filter, sample_diagnosis_genetic_analysis_file_filter_1) as sample_diagnosis_genetic_analysis_file_filter
          // combination 3
          optional match (p)<--(sm:sample)
          optional match (p)<--(file)
          where (file: clinical_measure_file or file:generic_file or file: radiology_file)
          optional match (p)<--(ga:genetic_analysis)
          optional match (sm)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_genetic_analysis_file_filter, sample_diagnosis_genetic_analysis_file_filter_1) as sample_diagnosis_genetic_analysis_file_filter
          // combination 4
          optional match (p)<--(sm:sample)
          optional match (p)<--(file)
          where (file: clinical_measure_file or file:generic_file or file: radiology_file)
          optional match (sm)<--(ga:genetic_analysis)
          optional match (p)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_genetic_analysis_file_filter, sample_diagnosis_genetic_analysis_file_filter_1) as sample_diagnosis_genetic_analysis_file_filter
          // combination 5
          optional match (p)<--(sm:sample)<--(file)
          where (file: sequencing_file or file: generic_file or file: methylation_array_file or file: pathology_file or file: cytogenomic_file)
          optional match (p)<--(ga:genetic_analysis)
          optional match (p)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_genetic_analysis_file_filter, sample_diagnosis_genetic_analysis_file_filter_1) as sample_diagnosis_genetic_analysis_file_filter
          // combination 6
          optional match (p)<--(sm:sample)<--(file)
          where (file: sequencing_file or file: generic_file or file: methylation_array_file or file: pathology_file or file: cytogenomic_file)
          optional match (sm)<--(ga:genetic_analysis)
          optional match (sm)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_genetic_analysis_file_filter, sample_diagnosis_genetic_analysis_file_filter_1) as sample_diagnosis_genetic_analysis_file_filter
          // combination 7
          optional match (p)<--(sm:sample)<--(file)
          where (file: sequencing_file or file: generic_file or file: methylation_array_file or file: pathology_file or file: cytogenomic_file)
          optional match (sm)<--(ga:genetic_analysis)
          optional match (p)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_genetic_analysis_file_filter, sample_diagnosis_genetic_analysis_file_filter_1) as sample_diagnosis_genetic_analysis_file_filter
          // combination 8
          optional match (p)<--(sm:sample)<--(file)
          where (file: sequencing_file or file: generic_file or file: methylation_array_file or file: pathology_file or file: cytogenomic_file)
          optional match (p)<--(ga:genetic_analysis)
          optional match (sm)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, CASE WHEN collect(sm) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_genetic_analysis_file_filter, sample_diagnosis_genetic_analysis_file_filter_1) as sample_diagnosis_genetic_analysis_file_filter
          // combination 9 (similar to combination 1, just need to group sm2 with file, ga, and dg)
          optional match (p)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2:sample)
          WHERE (cl: cell_line or cl: pdx)
          optional match (p)<--(file)
          where (file: clinical_measure_file or file:generic_file or file: radiology_file)
          optional match (p)<--(ga:genetic_analysis)
          optional match (p)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, CASE WHEN collect(sm2) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm2, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_genetic_analysis_file_filter, sample_diagnosis_genetic_analysis_file_filter_1) as sample_diagnosis_genetic_analysis_file_filter
          // combination 10 (similar to combination 3, just need to group sm2 with file, ga, and dg)
          optional match (p)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2:sample)
          WHERE (cl: cell_line or cl: pdx)
          optional match (p)<--(file)
          where (file: clinical_measure_file or file:generic_file or file: radiology_file)
          optional match (p)<--(ga:genetic_analysis)
          optional match (sm1)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, CASE WHEN collect(sm2) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm2, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_genetic_analysis_file_filter, sample_diagnosis_genetic_analysis_file_filter_1) as sample_diagnosis_genetic_analysis_file_filter
          // combination 11 (group both sm1 and sm2 with file, ga, and dg)
          optional match (p)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2:sample)
          WHERE (cl: cell_line or cl: pdx)
          optional match (p)<--(file)
          where (file: clinical_measure_file or file:generic_file or file: radiology_file)
          optional match (p)<--(ga:genetic_analysis)
          optional match (sm2)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, sm1, sm2, file, dg, ga
          with p, sample_diagnosis_genetic_analysis_file_filter,
            apoc.coll.union(
              CASE WHEN collect(sm1) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm1, file: file, dg: dg, ga: ga}) ELSE [] END,
              CASE WHEN collect(sm2) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm2, file: file, dg: dg, ga: ga}) ELSE [] END
            ) as sample_diagnosis_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_genetic_analysis_file_filter, sample_diagnosis_genetic_analysis_file_filter_1) as sample_diagnosis_genetic_analysis_file_filter
          // combination 12 (similar to combination 4, just need to group sm2 with file, ga, and dg)
          optional match (p)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2:sample)
          WHERE (cl: cell_line or cl: pdx)
          optional match (p)<--(file)
          where (file: clinical_measure_file or file:generic_file or file: radiology_file)
          optional match (sm1)<--(ga:genetic_analysis)
          optional match (p)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, CASE WHEN collect(sm2) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm2, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_genetic_analysis_file_filter, sample_diagnosis_genetic_analysis_file_filter_1) as sample_diagnosis_genetic_analysis_file_filter
          // combination 13 (similar to combination 2, just need to group sm2 with file, ga, and dg)
          optional match (p)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2:sample)
          WHERE (cl: cell_line or cl: pdx)
          optional match (p)<--(file)
          where (file: clinical_measure_file or file:generic_file or file: radiology_file)
          optional match (sm1)<--(ga:genetic_analysis)
          optional match (sm1)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, CASE WHEN collect(sm2) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm2, file: file, dg: dg, ga: ga}) ELSE [] END as sample_diagnosis_genetic_analysis_file_filter_1
          with p, apoc.coll.union(sample_diagnosis_genetic_analysis_file_filter, sample_diagnosis_genetic_analysis_file_filter_1) as sample_diagnosis_genetic_analysis_file_filter
          // combination 14 (need to group both sm1 and sm2 with file, ga, and dg)
          optional match (p)<-[:of_sample]-(sm1:sample)<--(cl)<--(sm2:sample)
          WHERE (cl: cell_line or cl: pdx)
          optional match (p)<--(file)
          where (file: clinical_measure_file or file:generic_file or file: radiology_file)
          optional match (sm1)<--(ga:genetic_analysis)
          optional match (sm2)<--(dg:diagnosis)
          with p, sample_diagnosis_genetic_analysis_file_filter, sm1, sm2, file, dg, ga
          with p, sample_diagnosis_genetic_analysis_file_filter,
            apoc.coll.union(
              CASE WHEN collect(sm1) <> [] OR collect(file) <> [] OR collect(ga) <> [] OR collect(dg) <> [] THEN collect(distinct {sm: sm1, file: file, dg: dg, ga: ga}) ELSE [] END,
